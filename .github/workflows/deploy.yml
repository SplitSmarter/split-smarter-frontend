name: Trigger App Deployment

on:
  push:
    branches:
      - release
      - main
      - qa
      - test
      - develop
  workflow_dispatch:
    inputs:
      should_publish:
        description: 'Publish app store submission/updates instantly?'
        required: true
        type: boolean
        default: false

jobs:
  call-central-workflow:
    uses: SplitSmarter/ci-cd-workflows/.github/workflows/expo-deploy.yml@main
    with:
      branch_name: ${{ github.ref }}
      # Defaults to true on automated git push events, or reads manual checkbox choice
      publish_artifact: ${{ github.event.inputs.should_publish || 'true' }}
    secrets: inherit
